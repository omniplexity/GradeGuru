appId: com.gradeguru.desktop
productName: GradeGuru
artifactName: GradeGuru-Setup-${version}.${ext}

directories:
  output: dist
  buildResources: build

files:
  - "src/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!**/.vscode/*"
  - "!electron-builder.yml"
  - "!{.eslintignore,.eslintrc.js,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GradeGuru
  uninstallDisplayName: GradeGuru

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

publish: null
